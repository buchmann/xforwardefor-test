# ============================================================================
#  Second test path: Apache as the DIRECT edge reverse proxy (NO L7 load
#  balancer / nginx in front).  Chain:
#
#     client (192.168.178.130)
#         │  L4 Service only forwards TCP (does NOT set any HTTP header)
#         ▼  externalTrafficPolicy: Local  -> preserves the real client IP
#     apache-direct  (Apache IS the edge here)
#         │  mod_proxy ADDS X-Forwarded-For = the real client
#         ▼
#     helloworld
#
#  Goal: prove that WITHOUT an upstream proxy, Apache's own mod_proxy sets
#  X-Forwarded-For to the real client IP. No mod_remoteip is needed in this
#  case (there is no inbound X-Forwarded-For to interpret).
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: apache-direct-conf
  namespace: xff-test
data:
  proxy-xff.conf: |
    LoadModule proxy_module        modules/mod_proxy.so
    LoadModule proxy_http_module   modules/mod_proxy_http.so
    LoadModule headers_module      modules/mod_headers.so

    # --- Edge anti-spoofing: this Apache faces clients directly, so it must NOT
    #     trust any X-Forwarded-For a client might send. Strip it first; mod_proxy
    #     then sets a fresh one from the real TCP connection.  "early" makes the
    #     unset run before the proxy phase re-adds the header. ---
    RequestHeader unset X-Forwarded-For early

    # No mod_remoteip here: there is no upstream proxy and no inbound XFF to read.
    # Apache already sees the real client as REMOTE_ADDR / %a, because the L4
    # Service preserves the source IP (externalTrafficPolicy: Local).

    # Log the client Apache sees + the inbound XFF (expected "-": clients don't
    # send one, and we stripped any that was sent).
    LogFormat "client=%a  xff-in=\"%{X-Forwarded-For}i\"  \"%r\"  %>s" xff
    CustomLog /proc/self/fd/1 xff

    # Reverse proxy to helloworld. ProxyAddHeaders On (the default) is THE setting
    # that makes mod_proxy add X-Forwarded-For = the client IP on the outbound
    # request to helloworld.
    ProxyPreserveHost On
    ProxyAddHeaders   On
    ProxyPass        /  http://helloworld.xff-test.svc.cluster.local:3000/
    ProxyPassReverse /  http://helloworld.xff-test.svc.cluster.local:3000/

    # Explicit single-value header = the real client (REMOTE_ADDR).
    RequestHeader set X-Real-IP "expr=%{REMOTE_ADDR}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-direct
  namespace: xff-test
  labels: { app: apache-direct }
spec:
  replicas: 1
  selector:
    matchLabels: { app: apache-direct }
  template:
    metadata:
      labels: { app: apache-direct }
    spec:
      containers:
        - name: apache
          image: httpd:2.4
          command: ["/bin/sh", "-c"]
          args:
            - >
              echo 'Include conf/extra/proxy-xff.conf' >> /usr/local/apache2/conf/httpd.conf &&
              httpd-foreground
          ports:
            - containerPort: 80
          volumeMounts:
            - name: conf
              mountPath: /usr/local/apache2/conf/extra/proxy-xff.conf
              subPath: proxy-xff.conf
      volumes:
        - name: conf
          configMap:
            name: apache-direct-conf
---
apiVersion: v1
kind: Service
metadata:
  name: apache-direct
  namespace: xff-test
  labels: { app: apache-direct }
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.178.217"
spec:
  # L4 Service only — forwards TCP, does not modify HTTP headers. This is the
  # plumbing to reach Apache from outside; Apache is still the edge proxy.
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector: { app: apache-direct }
  ports:
    - name: http
      port: 80
      targetPort: 80
